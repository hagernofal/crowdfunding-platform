<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="styles/style.css">
</head>
<body>

<header class="admin-header">
  <h1>Admin Dashboard</h1>
  <div>
    <a href="index.html">Home</a>
  </div>
</header>

<div class="admin-container">

  <section class="admin-section">
    <h2>Users</h2>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="users-table"></tbody>
    </table>
  </section>

  <section class="admin-section">
    <h2>Campaigns</h2>
    <table>
      <thead>
        <tr>
          <th>Title</th>
          <th>Creator</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="campaigns-table"></tbody>
    </table>
  </section>
  <section class="admin-section">
  <h2>Pledges</h2>
  <table>
    <thead>
      <tr>
        <th>User</th>
        <th>Campaign</th>
        <th>Amount</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody id="pledges-table"></tbody>
  </table>
</section>


</div>


<script src="scripts/admin.js"></script>
</body>
</html>
